<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Practice Session — TransformVXR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@800;900&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #0D1B2A; --navy-mid: #111F30; --navy-card: #162840;
      --teal: #2EC4B6; --magenta: #FF4DD0; --magenta-dim: #D93CB0;
      --white: #F2F4F3; --muted: #7A96AB;
      --border: rgba(46, 196, 182, 0.13);
      --topbar-h: 56px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      overflow: hidden;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      background: var(--navy);
      color: var(--white);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    /* TOP BAR */
    .top-bar {
      height: var(--topbar-h);
      flex-shrink: 0;
      background: rgba(13,27,42,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      z-index: 100;
    }
    .top-bar-left {
      display: flex; align-items: center; gap: 1.25rem;
    }
    .nav-logo {
      display: flex; align-items: center; gap: 8px;
      font-family: 'Nunito Sans', sans-serif;
      font-weight: 900; font-size: 1.1rem;
      color: var(--white); text-decoration: none;
      letter-spacing: -0.02em;
    }
    .nav-logo img {
      width: 28px; height: 28px;
      object-fit: contain; mix-blend-mode: screen; flex-shrink: 0;
    }
    .nav-logo span { color: var(--magenta); }

    .top-bar-divider {
      width: 1px; height: 20px;
      background: var(--border);
    }
    .session-label {
      font-size: 0.8125rem;
      color: var(--muted);
      font-weight: 300;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .session-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--teal);
      animation: pulse 2s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .top-bar-right {
      display: flex; align-items: center; gap: 1rem;
    }
    .user-email {
      font-size: 0.8125rem;
      color: var(--muted);
      font-weight: 300;
    }
    .btn-back {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8125rem;
      font-weight: 600;
      padding: 0.4rem 1rem;
      border-radius: 6px;
      text-decoration: none;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-back:hover { border-color: var(--teal); color: var(--white); }
    .btn-back svg {
      width: 12px; height: 12px;
      stroke: currentColor; fill: none; stroke-width: 2;
    }

    /* GAME AREA */
    .game-area {
      flex: 1;
      display: flex;
      align-items: stretch;
      padding: 1.25rem;
      min-height: 0;
    }

    .game-frame-wrap {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      background: #000;
    }

    .game-frame-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* placeholder state — remove when wiring real iframe */
    .game-placeholder {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1rem;
      background: #050d14;
    }
    .game-placeholder p {
      font-size: 0.875rem;
      color: var(--muted);
      font-weight: 300;
    }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="top-bar-left">
      <a href="index.html" class="nav-logo">
        <img src="images/tvxr_logo.png" alt="TransformVXR" />
        Transform<span>VXR</span>
      </a>
      <div class="top-bar-divider"></div>
      <div class="session-label">
        <span class="session-dot"></span>
        Session in progress
      </div>
    </div>
    <div class="top-bar-right">
      <span class="user-email">ojas@transformvxr.com</span>
      <a href="home.html" class="btn-back">
        <svg viewBox="0 0 12 12"><path d="M8 2L4 6l4 4"/></svg>
        Back to Dashboard
      </a>
    </div>
  </div>

  <!-- GAME AREA -->
  <div class="game-area">
    <div class="game-frame-wrap">
      <!--
        DEVELOPER NOTE:
        Replace the placeholder below with the actual iframe src.
        Example:
        <iframe src="https://your-game-url.com" allow="microphone; camera" allowfullscreen></iframe>
      -->
      <div class="game-placeholder">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="20" r="19" stroke="rgba(46,196,182,0.2)" stroke-width="1"/>
          <polygon points="16,13 28,20 16,27" fill="rgba(255,77,208,0.4)"/>
        </svg>
        <p>Game iframe loads here</p>
      </div>
    </div>
  </div>

</body>
</html>
