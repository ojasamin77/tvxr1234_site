<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — TransformVXR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@800;900&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #0D1B2A; --navy-mid: #111F30; --navy-card: #162840;
      --teal: #2EC4B6; --magenta: #FF4DD0; --magenta-dim: #D93CB0;
      --white: #F2F4F3; --muted: #7A96AB;
      --border: rgba(46, 196, 182, 0.13);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      background: var(--navy);
      color: var(--white);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* subtle background gradient matching site */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(255,77,208,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 80% 80%, rgba(46,196,182,0.05) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    /* TOP BAR — logo only */
    .top-bar {
      position: relative; z-index: 1;
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      display: flex; align-items: center; gap: 8px;
      font-family: 'Nunito Sans', sans-serif;
      font-weight: 900; font-size: 1.25rem;
      color: var(--white); text-decoration: none;
      letter-spacing: -0.02em;
    }
    .nav-logo img {
      width: 32px; height: 32px;
      object-fit: contain; mix-blend-mode: screen; flex-shrink: 0;
    }
    .nav-logo span { color: var(--magenta); }

    /* MAIN */
    main {
      flex: 1;
      position: relative; z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    /* LOGIN CARD */
    .login-card {
      width: 100%;
      max-width: 440px;
      background: var(--navy-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      position: relative;
      overflow: hidden;
    }
    .login-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--magenta), var(--teal));
    }

    .card-heading {
      font-family: 'Nunito Sans', sans-serif;
      font-weight: 900;
      font-size: 1.75rem;
      letter-spacing: -0.025em;
      color: var(--white);
      margin-bottom: 0.4rem;
    }
    .card-sub {
      font-size: 0.875rem;
      color: var(--muted);
      font-weight: 300;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    /* FORM */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 1.25rem;
    }
    .form-group label {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.02em;
    }
    .form-group input {
      background: var(--navy);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.7rem 1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9375rem;
      font-weight: 400;
      color: var(--white);
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    .form-group input::placeholder { color: var(--muted); opacity: 0.6; }
    .form-group input:focus { border-color: var(--teal); }

    .forgot-link {
      display: block;
      text-align: right;
      font-size: 0.8125rem;
      color: var(--muted);
      text-decoration: none;
      margin-top: -0.75rem;
      margin-bottom: 1.5rem;
      transition: color 0.2s;
    }
    .forgot-link:hover { color: var(--white); }

    .btn-signin {
      display: block;
      width: 100%;
      background: var(--magenta);
      color: var(--navy);
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 0.9375rem;
      padding: 0.75rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      text-align: center;
      transition: background 0.2s, transform 0.15s;
      letter-spacing: 0.01em;
    }
    .btn-signin:hover { background: var(--magenta-dim); transform: translateY(-1px); }
    .btn-signin:active { transform: translateY(0); }

    .card-footer-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.8125rem;
      color: var(--muted);
      font-weight: 300;
    }
    .card-footer-link a {
      color: var(--teal);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }
    .card-footer-link a:hover { color: var(--white); }

    /* BOTTOM BAR */
    .bottom-bar {
      position: relative; z-index: 1;
      padding: 1.25rem 2rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    .bottom-bar p {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 300;
    }
    .bottom-bar a {
      font-size: 0.8rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .bottom-bar a:hover { color: var(--white); }

    @media (max-width: 480px) {
      .login-card { padding: 2rem 1.5rem; }
      .bottom-bar { justify-content: center; text-align: center; }
    }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="top-bar">
    <a href="index.html" class="nav-logo">
      <img src="images/tvxr_logo.png" alt="TransformVXR" />
      Transform<span>VXR</span>
    </a>
  </div>

  <!-- MAIN -->
  <main>
    <div class="login-card">
      <h1 class="card-heading">Sign in</h1>
      <p class="card-sub">Use your email and password to access Transform VXR.</p>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@company.com" autocomplete="email" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <a href="#" class="forgot-link">Forgot password?</a>

      <button class="btn-signin">Sign in</button>

      <p class="card-footer-link">
        Don't have an account yet? <a href="contact.html#demo">Contact us</a>
      </p>
    </div>
  </main>

  <!-- BOTTOM BAR -->
  <div class="bottom-bar">
    <p>2026 Transform VXR. All rights reserved.</p>
    <a href="index.html">Back to transformvxr.com</a>
  </div>

</body>
</html>
